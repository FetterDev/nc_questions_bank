services:
  postgres:
    image: postgres:16-alpine
    container_name: nord-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-interview_bank}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-interview_bank}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - app

  backend-migrate:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    container_name: nord-backend-migrate
    command:
      [
        "sh",
        "-lc",
        "npm run prisma:migrate:deploy && npm run bootstrap:admin"
      ]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-interview_bank}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-8}
      BOOTSTRAP_ADMIN_LOGIN: ${BOOTSTRAP_ADMIN_LOGIN:-nord.admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-admin-password-2026}
      BOOTSTRAP_ADMIN_DISPLAY_NAME: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:-Nord Admin}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-nord.admin@example.com}
      BOOTSTRAP_ADMIN_FORCE_UPDATE: ${BOOTSTRAP_ADMIN_FORCE_UPDATE:-false}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - app

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    container_name: nord-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-*}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-interview_bank}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-8}
    depends_on:
      postgres:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - app

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/frontend.Dockerfile
    container_name: nord-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app

volumes:
  postgres_data:

networks:
  app:
    driver: bridge
